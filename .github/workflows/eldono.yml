name: Eldono de EO IME

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'versia numero v0.1'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write
    
    steps:
      - name: Elpreni la kodon.
        uses: actions/checkout@v7

      - name: Agordi Rust-on.
        uses: dtolnay/rust-toolchain@stable

      - name: Konstrui eldonan version.
        run: cargo build --release
      
      - name: Krei eldonon kaj alŝuti.
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: EO IME ${{ github.event.inputs.tag }}
          tag_name: ${{ github.event.inputs.tag }}
          files: target/release/eo_ime.exe
          prerelease: true
          body: |
            ## 🔧 修复更新

            - 修复启动时出现控制台黑窗口的问题
            - 现在程序完全在后台静默运行
            - 添加程序ico图标
