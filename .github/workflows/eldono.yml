name: Eldono de EO IME

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write
    
    steps:
      - name: Elpreni la kodon.
        uses: actions/checkout@v7

      - name: Akiri versian numeron.
        id: versio
        shell: bash
        run: |
          # Eltiri versian numeron el Cargo.toml.
          echo "versio=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')" >> $GITHUB_OUTPUT

      - name: Agordi Rust-on.
        uses: dtolnay/rust-toolchain@stable

      - name: Konstrui eldonan version.
        run: cargo build --release
      
      - name: Krei eldonon kaj alŝuti.
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: EO IME v${{ steps.versio.outputs.versio }}
          tag_name: v${{ steps.versio.outputs.versio }}
          files: target/release/eo_ime.exe
          prerelease: false
          body: |
            ## 🔧 修复更新

            - 添加变量用以控制是否大写
            - 修复进入两次特定字母问题
            - 增加3秒钟不输入x就删除上一个存储的特定按键
            - 增加语言切换之后删除存储的特定按键
            - 修复所有语言，都会删除按键问题
            - 修改退出为世界语
            
