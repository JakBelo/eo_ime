name: Eldono de EO IME

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'versia numero v0.1'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Elpreni la kodon.
        uses: actions/checkout@v7

      - name: Agordi Rust-on.
        uses: dtolnay/rust-toolchain@stable

      - name: Konstrui eldonan version.
        run: cargo build --release
      
      - name: Krei eldonon kaj alŝuti.
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: EO IME ${{ github.event.inputs.tag }}
          tag_name: ${{ github.event.inputs.tag }}
          files: target/release/eo_ime.exe
          prerelease: true
          body: |
            ## 🎉 首个预览版发布

            - 支持 x-system 世界语字母输入
            - Windows 11 支持
            - 轻量无依赖

            ## 📦 下载

            下载 `eo_ime.exe` 并运行。
